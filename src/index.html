<!doctype html>
<html lang="ru" style="color-scheme: light;">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    
    <meta name="color-scheme" content="light only">
    <meta name="supported-color-schemes" content="light">
    
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/amina-logo.png.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Amina">
    
    <title>Amina Cafe</title>
    <style>
      :root { color-scheme: light only !important; }
    </style>
  </head>
  <body style="background-color: #f4f5f7; color: #111827;">
    <div id="root"></div>
    
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch((err) => console.log('SW registration failed:', err));
        });
      }
    </script>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
